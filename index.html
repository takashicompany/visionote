<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Visionote – Even G2</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>

<body>

<div id="app">
  <h1>Visionote <span id="app-version" style="font-size:0.4em;color:#888;font-weight:normal;"></span></h1>

  <div id="image-section">
    <label id="file-label" for="file-input">Select Image</label>
    <input type="file" id="file-input" accept="image/*" />

    <div id="editor-area" style="display:none;">
      <div id="canvas-wrapper">
        <canvas id="preview-canvas" width="200" height="200"></canvas>
      </div>

      <div id="controls">
        <div class="control-row">
          <label>Brightness</label>
          <input type="range" id="brightness-slider" min="-100" max="100" value="0" />
          <span id="brightness-value">0</span>
        </div>
        <div class="control-row">
          <label>Contrast</label>
          <input type="range" id="contrast-slider" min="-100" max="100" value="0" />
          <span id="contrast-value">0</span>
        </div>
        <div class="control-row">
          <label>Invert</label>
          <input type="checkbox" id="invert-toggle" />
        </div>
      </div>

      <div id="action-buttons">
        <button id="sendBtn">Send Image</button>
        <button id="saveBtn">Save Image</button>
      </div>
    </div>
  </div>

  <div id="saved-section">
    <p id="saved-count">Saved Images (0):</p>
    <div id="saved-list"></div>
  </div>

  <details id="dev-section">
    <summary>Development</summary>
    <button id="connectBtn">Connect to G2</button>
    <button id="resendBtn">Resend to glasses</button>
    <pre id="event-log"></pre>
  </details>
</div>

<script type="module" src="/src/main.ts"></script>

</body>
</html>
